<body class="body">

    <!--form-->
    <section>
     <div>
            <form action="Home page.html" >
                <div class="login-box">
                <input type="email" placeholder="email" required>
                 <br>
                  <input type="password" placeholder="password" required>
                 </div>
                 
                <div class="check">
                     <span>Age</span>

                 <input type="radio" name="age" value="-12" required>
                 <label>-12</label>
                 <input type="radio" name="age" value="+12">
                   <label>+12</label>
                <br>
                   <span>Games</span>
                <br>
                    <input type="checkbox" name="game1" value="playstation">
                    <label>Playstation</label>
                    <br>
                    <input type="checkbox" name="game2" value="xbox" >
                    <label>Xbox</label>
                </div>
                <div class="action-buttons">
                    <input type="submit" value="submit">
                    <input type="reset" value="reset">
                </div>
                
            </form>
        </div>
    </section>
